<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mídias em HTML5</title>
</head>
<body>
   <h1>Imagem dinâmica</h1> 
   <p>Tente abrir esse site em varios dispositivos diferentes, ou simplesmente aumente e diminua o tamanho da janela do navegador.</p>

   <picture> <!-- Ordem das imagens da menor para a maior -->
    <source media="(max-width: 750px)" srcset="imagens/foto-p.png" type="image/png"> <!-- dispositivo com menos de 750px terão a imagem P exibida -->
    <source media="(max-width: 1050px)" srcset="imagens/foto-m.png" type="image/png"> <!-- dispositivo com menos de 1050px terão a imagem M exibida -->
    <img src="Imagens/foto-g.png" alt="Imagem flexível"> <!-- Imagem padrão -->
</picture>

<h1>Reproduzindo áudio</h1>
<p>Vamos aprender a reproduzir áudios em HTML5</p>
<audio src="midia/happy-mistake.mp3" controls></audio> <!-- MP3 WAV OGG --> 
<p>Caso seu navegador não esteja conseguindo reproduzir o áudio, <a href="midia/happy-mistake.mp3" target="_blank">clique aqui</a> para baixa-lo!</p>
</body>
</html>
