<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes Externas</title>
    <style>
        @font-face {
            font-family: 'gemstone';
            src: url(fonts/Gemstone.ttf) format('truetype'); /* --open type, true type, embed open type, true type-aat (Apple advanced typography), svg */
            font-weight: normal; 
            font-style: normal;
        }
        body{
            font-family: Arial, Helvetica, sans-serif;
        }
        h1{
            font-family: 'gemstone', Times, serif;
            font-size: 3em;
            font-weight: normal;
        }
    </style>
</head>
<body>
   <h1>Título</h1>
   <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Laborum et error quos deleniti beatae laudantium alias tempora iusto quaerat soluta ut minima sit, sint quibusdam modi quod expedita numquam voluptatibus?</p>
</body>
</html>
